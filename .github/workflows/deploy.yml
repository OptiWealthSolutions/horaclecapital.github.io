name: Build & Deploy — Horacle Capital

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Astro dependencies
        run: npm ci

      - name: Build Astro (rapports/ & recherches/)
        run: npm run build
        # Outputs to dist/ — contains only Astro-generated pages

      - name: Copy static site files into dist/
        run: |
          # HTML pages
          for f in *.html; do [ -f "$f" ] && cp "$f" dist/; done
          # Core assets
          cp style.css tailwind-config.js main.js dist/
          [ -f search-index.json ] && cp search-index.json dist/
          [ -f sitemap.xml ]       && cp sitemap.xml dist/
          [ -f robots.txt ]        && cp robots.txt dist/
          [ -f CNAME ]             && cp CNAME dist/
          # Directories
          [ -d assets ]  && cp -r assets dist/
          [ -d reports ] && cp -r reports dist/
          [ -d pages ]   && cp -r pages dist/
          # PDFs at root
          for f in *.pdf; do [ -f "$f" ] && cp "$f" dist/; done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
